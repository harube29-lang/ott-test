<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>OTT 랜딩페이지 구현 캡처 이미지</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Noto Sans KR',sans-serif;background:#0f0f0f;color:#fff;padding:40px 5%}
  h1{font-size:1.5rem;font-weight:900;margin-bottom:6px}
  .sub{color:#888;font-size:0.9rem;margin-bottom:40px}
  .section{margin-bottom:48px}
  .section h2{font-size:1rem;font-weight:700;color:#E50914;border-left:3px solid #E50914;padding-left:10px;margin-bottom:16px;text-transform:uppercase;letter-spacing:1px}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px}
  .card{background:#181818;border:1px solid rgba(255,255,255,0.08);border-radius:8px;overflow:hidden}
  .card img{width:100%;display:block;transition:transform 0.3s}
  .card:hover img{transform:scale(1.02)}
  .card-label{padding:10px 14px;font-size:0.8rem;color:#aaa;font-weight:600}
  a{text-decoration:none;color:inherit;display:block}
</style>
</head>
<body>
<h1>OTT 랜딩페이지 — 구현 캡처 이미지</h1>
<p class="sub">작성자: 황혜경 &nbsp;|&nbsp; 2026. 06. 18 &nbsp;|&nbsp; AI바이브코딩웹</p>

<div class="section">
  <h2>반응형 비교 (히어로 배너)</h2>
  <div class="grid">
    <div class="card"><a href="hero-desktop.png" target="_blank"><img src="hero-desktop.png" alt="데스크톱"/><div class="card-label">데스크톱 — 1280px</div></a></div>
    <div class="card"><a href="hero-tablet.png" target="_blank"><img src="hero-tablet.png" alt="태블릿"/><div class="card-label">태블릿 — 768px</div></a></div>
    <div class="card"><a href="hero-mobile.png" target="_blank"><img src="hero-mobile.png" alt="모바일"/><div class="card-label">모바일 — 390px</div></a></div>
  </div>
</div>

<div class="section">
  <h2>섹션별 구현 화면 (데스크톱)</h2>
  <div class="grid">
    <div class="card"><a href="contents-desktop.png" target="_blank"><img src="contents-desktop.png" alt="콘텐츠"/><div class="card-label">주요 콘텐츠 영역</div></a></div>
    <div class="card"><a href="detail-desktop.png" target="_blank"><img src="detail-desktop.png" alt="상세소개"/><div class="card-label">상세 소개 영역 (Editor's Pick)</div></a></div>
    <div class="card"><a href="recommend-desktop.png" target="_blank"><img src="recommend-desktop.png" alt="추천"/><div class="card-label">추천 콘텐츠 슬라이더</div></a></div>
    <div class="card"><a href="footer-desktop.png" target="_blank"><img src="footer-desktop.png" alt="푸터"/><div class="card-label">푸터 (FAQ · Top 버튼)</div></a></div>
  </div>
</div>

<div class="section">
  <h2>전체 페이지 캡처</h2>
  <div class="grid">
    <div class="card"><a href="full-desktop.png" target="_blank"><img src="full-desktop.png" alt="전체 데스크톱"/><div class="card-label">전체 — 데스크톱 1280px</div></a></div>
    <div class="card"><a href="full-tablet.png" target="_blank"><img src="full-tablet.png" alt="전체 태블릿"/><div class="card-label">전체 — 태블릿 768px</div></a></div>
    <div class="card"><a href="full-mobile.png" target="_blank"><img src="full-mobile.png" alt="전체 모바일"/><div class="card-label">전체 — 모바일 390px</div></a></div>
  </div>
</div>
</body>
</html>
